
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FSY Counselor Preference Form</title>
  <link rel="icon" href="/ponder/images/favicon.ico">
  <link rel="stylesheet" href="eventform.css" />
  <script src="eventform.js" defer></script>
</head>
<body>
  <main class="wrapper">
    <h1>Event Ticket</h1>

   <form id="EventForm">
  <div class="field">
    <label for="firstName">First Name</label>
    <input id="firstName" name="firstName" type="text" required />
  </div>

  <div class="field">
    <label for="lastName">Last Name</label>
    <input id="lastName" name="lastName" type="text" required />
  </div>

  <div class="field full">
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />
  </div>

  <div class="field">
    <label for="type">Type:</label>
    <select id="type" name="type" required>
      <option value="">Select One</option>
      <option value="student">Student</option>
      <option value="guest">Guest</option>
    </select>
  </div>


  <div class="field">
    <label for="availableDate">Event Date</label>
    <input id="availableDate" name="availableDate" type="date" required />
  </div>

  <button class="full" type="submit">Submit Preferences</button>

<div class="field full" id="extraField" hidden>
  <label id="extraLabel" for="extraInput">Student I#</label>
  <input id="extraInput" type="text">
</div>
</form>

      <div id="errors"></div>

    <div id="ticketInfo"></div>
    <section id="output" aria-live="polite"></section>
  </main>
</body>
</html>
