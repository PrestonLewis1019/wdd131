<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card</title>
    <link rel="stylesheet" href="charactercard.css">
    <script src="charactercard.js" defer></script>
</head>
<body>

<div class="card">
    <img
        src="https://andejuli.github.io/wdd131/character_card/snortleblat.webp" alt="Character Image" class="image" id="characterImage"
    >

    <div class="name" id="characterName"></div>

    <div class="stats">
        <p id="characterClass"></p>
        <p id="characterLevel"></p>
        <p id="characterHealth"></p>
    </div>

    <div class="buttons">
        <button id="attackBtn" type="button">Attacked</button>
        <button id="levelBtn" type="button">Level Up</button>
    </div>
</div>

</body>
</html>
